<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Musical Match Saga</title>
</head>
<body>
    <div class="container">
        <h1>🎵 Musical Match Saga 🎶</h1>
        <div class="menu">
            <button id="playBtn">Play Game</button>
            <button id="howToPlayBtn">How to Play</button>
        </div>
        <div>
        <div id="movesDisplay" class="hidden"></div>
        <div id="scoreDisplay" class="hidden"></div>
        </div>
        <div id="game-board-container" class="hidden">
           <div id="gameBoard" class="hidden"></div>
        </div>

        <div id="gameEndModal" class="hidden">
            <div class="modal-content">
                <h2>Well Done!</h2>
                <p>Your score is: <span id="finalScore"></span></p>
                <button id="playAgainBtn">Play Again</button>
            </div>
        </div>
    </div>

     </div>
    <script src="script.js"></script>
</body>
</html>
