<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Musical Match Saga</title>
</head>
<body>
    <div class="container">
        <h1>🎵 Musical Match Saga 🎶</h1>
        <div class="menu">
            <button id="playBtn">Play Game</button>
            <button id="howToPlayBtn">How to Play</button>
        </div>
        <div id="game-board-container" class="hidden">
            <div id="score-moves-wrapper">
                <div class="top-bar-custom">
                    <div id="livesDisplay" class="lives-bar"><span class="heart">❤️</span> <span id="livesCount">5</span></div>
                    <div id="levelDisplay" class="hidden level-center">LEVEL 1</div>
                </div>
                <div id="objective-counters" class="symbol-counters-row"></div>
                <div class="moves-score-timer-row">
                    <div id="movesDisplay" class="hidden moves-horizontal">Moves: 0</div>
                    <div id="scoreDisplay" class="hidden score-horizontal">Score: 0</div>
                    <div id="timerDisplay" class="hidden timer-horizontal">Time: 0s</div>
                </div>
                </div>
            </div>
            <div id="gameBoard"></div>
            <div id="restartContainer" class="hidden" style="text-align:center; margin-top: 16px;">
                <button id="restartBtn">Restart Level</button>
                <button id="nextLevelBtn" class="hidden">Next Level</button>
            </div>
        </div>
        <!-- Game end modal removed -->
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
