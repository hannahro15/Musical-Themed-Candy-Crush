<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Musical Match Saga</title>
</head>
<body>
    <div class="container">
        <h1>🎵 Musical Match Saga 🎶</h1>
        <div class="menu">
            <button id="playBtn">Play Game</button>
            <button id="howToPlayBtn">How to Play</button>
        </div>
        <div id="game-board-container" class="hidden">
            <div id="score-moves-wrapper">
                <div class="level-bar">
                    <div id="levelDisplay" class="hidden">Level 1</div>
                </div>
                <div class="main-bar">
                    <div class="left-bar">
                        <div id="level1-counters" class="hidden symbol-row">
                            <span id="violinCounter">🎻: 10</span>
                            <span id="pianoCounter">🎹: 10</span>
                        </div>
                    </div>
                    <div class="middle-bar">
                        <div id="objectiveDisplay" class="hidden">Collect 6 violins and 6 pianos!</div>
                    </div>
                    <div class="right-bar">
                        <div id="livesDisplay" class="hidden lives-right"></div>
                        <div id="movesDisplay" class="hidden moves-right"></div>
                        <div id="scoreDisplay" class="hidden score-right"></div>
                        <div id="timerDisplay" class="hidden"></div>
                    </div>
                </div>
            </div>
            <div id="gameBoard" class="hidden"></div>
            <div id="restartContainer" class="hidden" style="text-align:center; margin-top: 16px;">
                <button id="restartBtn">Restart Level</button>
            </div>
            <div id="nextLevelContainer" class="hidden" style="text-align:center; margin-top: 16px;">
                <button id="nextLevelBtn">Next Level</button>
            </div>
        </div>
        <!-- Game end modal removed -->
    </div>
    <script src="script.js"></script>
</body>
</html>
